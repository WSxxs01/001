<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#050506" />
    <title>艾宾浩斯复习打卡系统</title>

    <!-- 全局主题样式 -->
    <link rel="stylesheet" href="/src/assets/theme.css" />

    <!-- 全局 CSS 修复：禁止事件吞噬 + 强制暗黑背景 -->
    <style>
      /* ============================================
         强制级暗黑背景系统 (Linear Style)
         ============================================ */
      html, body, #app {
        background-color: #050506 !important;
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(94, 106, 210, 0.15) 0%, transparent 50%),
          radial-gradient(ellipse 60% 40% at 10% 10%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
          radial-gradient(ellipse 50% 50% at 90% 20%, rgba(6, 182, 212, 0.06) 0%, transparent 40%),
          linear-gradient(180deg, #050506 0%, #020203 100%) !important;
        background-attachment: fixed !important;
        color: #EDEDEF !important;
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
      }

      /* 次级文本颜色 */
      .text-muted { color: #8A8F98 !important; }
      .text-secondary { color: #55585F !important; }

      /* ============================================
         移动端点击穿透修复（核心补丁）
         ============================================ */
      /* 禁止按钮内部元素吞噬点击事件 */
      button * {
        pointer-events: none !important;
      }

      /* 核心修复：所有按钮的移动端优化 */
      button {
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        user-select: none;
        -webkit-user-select: none;
      }

      /* 解决 iOS 下 hover 导致需要双击的问题 */
      @media (hover: hover) {
        button:hover {
          /* 保持原有 hover 逻辑，但在纯触摸屏上禁用它 */
        }
      }

      /* 触摸设备上禁用 hover 效果，避免延迟 */
      @media (pointer: coarse) {
        button:hover {
          /* 纯触摸设备上不执行 hover */
        }
        button:active {
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
