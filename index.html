<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#050506" />
    <title>FSRS 智能记忆调度中心</title>

    <!-- Inter 字体 - Linear 设计系统灵魂 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- 全局主题样式 -->
    <link rel="stylesheet" href="/src/assets/theme.css" />

    <!-- 全局 CSS 修复：禁止事件吞噬 + 强制暗黑背景 -->
    <style>
      /* ============================================
         第一步：Body 兜底 + 相对定位
         ============================================ */
      body, html {
        margin: 0;
        padding: 0;
        background-color: #050506; /* 极客深渊黑底色兜底 */
        min-height: 100vh;

        /* ============================================
           顶级字体栈 & 抗锯齿 (Typography Optimization)
           ============================================ */
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif !important;

        /* 暗色模式抗锯齿 - 让字体变细变锐利 */
        -webkit-font-smoothing: antialiased !important;
        -moz-osx-font-smoothing: grayscale !important;
        text-rendering: optimizeLegibility !important;
      }

      #app {
        /* 确保 Vue 根节点是透明的，不要遮挡底下的极光 */
        background: transparent !important;
        position: relative;
        z-index: 1;
        color: #EDEDEF !important;
        overflow-x: hidden;
      }

      /* 次级文本颜色 */
      .text-muted { color: #8A8F98 !important; }
      .text-secondary { color: #55585F !important; }

      /* ============================================
         移动端点击穿透修复（核心补丁）
         ============================================ */
      /* 禁止按钮内部元素吞噬点击事件 */
      button * {
        pointer-events: none !important;
      }

      /* 核心修复：所有按钮的移动端优化 */
      button {
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        user-select: none;
        -webkit-user-select: none;
      }

      /* 解决 iOS 下 hover 导致需要双击的问题 */
      @media (hover: hover) {
        button:hover {
          /* 保持原有 hover 逻辑，但在纯触摸屏上禁用它 */
        }
      }

      /* 触摸设备上禁用 hover 效果，避免延迟 */
      @media (pointer: coarse) {
        button:hover {
          /* 纯触摸设备上不执行 hover */
        }
        button:active {
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
